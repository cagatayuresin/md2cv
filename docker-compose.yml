services:
  md2cv:
    image: ghcr.io/cagatayuresin/md2cv:latest
    build:
      context: .
      args:
        VERSION: "2.0.0"
    container_name: md2cv
    ports:
      - "8000:8000"
    environment:
      MD2CV_CORS_ORIGINS: "*"
      MD2CV_LOG_LEVEL: "INFO"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health', timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
