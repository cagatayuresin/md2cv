<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>md2cv — Markdown to CV</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta20/dist/css/tabler.min.css"
          integrity="sha384-GgnF119bh9fxkKuWHRQYSgEe1rSp5jB0EJ2W8eMf8mjowfwhZP2H1u8n8xJUW3FQ"
          crossorigin="anonymous">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.5.0/dist/tabler-icons.min.css"
          integrity="sha384-+puAiKlHkiWGYymwDpBXaGxOK+N2hIcwql7TSuLBOf4VcDjlptc2O87oZMvci0KG"
          crossorigin="anonymous">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/easymde@2.18.0/dist/easymde.min.css"
          integrity="sha384-uqD/OYCNfagd1EgXMgl5QedTD5K+B3e9b8GYo/41t7+Serf7CBxvl+tU1gHd+qd1"
          crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="page">
    <header class="navbar navbar-expand-md navbar-light d-print-none">
        <div class="container-xl">
            <h1 class="navbar-brand navbar-brand-autodark d-flex align-items-center gap-2 m-0">
                <i class="ti ti-file-text-ai"></i>
                <span>md2cv</span>
                <span class="badge bg-primary text-white ms-2" id="version-badge">v2.0.0</span>
            </h1>
            <div class="ms-auto d-flex gap-2">
                <a href="/docs" class="btn btn-outline-secondary btn-sm" target="_blank" rel="noopener">
                    <i class="ti ti-api"></i> API Docs
                </a>
                <a href="https://github.com/cagatayuresin/md2cv"
                   class="btn btn-outline-dark btn-sm" target="_blank" rel="noopener">
                    <i class="ti ti-brand-github"></i> GitHub
                </a>
            </div>
        </div>
    </header>

    <div class="page-body">
        <div class="container-xl py-3">
            <div class="card mb-3">
                <div class="card-body">
                    <div class="row g-3 align-items-end">
                        <div class="col-md-4">
                            <label class="form-label" for="template-select">
                                <i class="ti ti-template"></i> Template
                            </label>
                            <select id="template-select" class="form-select"></select>
                        </div>
                        <div class="col-md-4">
                            <fieldset class="m-0 p-0 border-0">
                                <legend class="form-label fs-5 mb-1">
                                    <i class="ti ti-file-export"></i> Formats
                                </legend>
                                <div class="d-flex gap-3">
                                    <label class="form-check form-check-inline" for="format-pdf">
                                        <input id="format-pdf" class="form-check-input format-check"
                                               type="checkbox" value="pdf" checked>
                                        <span class="form-check-label">PDF</span>
                                    </label>
                                    <label class="form-check form-check-inline" for="format-docx">
                                        <input id="format-docx" class="form-check-input format-check"
                                               type="checkbox" value="docx">
                                        <span class="form-check-label">DOCX</span>
                                    </label>
                                </div>
                            </fieldset>
                        </div>
                        <div class="col-md-4 text-md-end">
                            <button id="convert-btn" class="btn btn-primary">
                                <i class="ti ti-download"></i>
                                Convert &amp; Download
                            </button>
                        </div>
                    </div>
                    <div id="alert-container" class="mt-3"></div>
                </div>
            </div>

            <div class="row g-3">
                <div class="col-lg-6">
                    <div class="card h-100">
                        <div class="card-header">
                            <h3 class="card-title m-0">
                                <i class="ti ti-markdown"></i> Markdown Editor
                            </h3>
                        </div>
                        <div class="card-body p-0">
                            <textarea id="md-editor"></textarea>
                        </div>
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="card h-100">
                        <div class="card-header">
                            <h3 class="card-title m-0">
                                <i class="ti ti-eye"></i> Live Preview
                            </h3>
                        </div>
                        <div class="card-body p-0">
                            <iframe id="preview-frame" title="Live preview"></iframe>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer footer-transparent d-print-none">
        <div class="container-xl">
            <div class="row text-center align-items-center">
                <div class="col-12">
                    md2cv &mdash; MIT License &mdash;
                    <a href="https://github.com/cagatayuresin/md2cv" target="_blank" rel="noopener">
                        github.com/cagatayuresin/md2cv
                    </a>
                </div>
            </div>
        </div>
    </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/easymde@2.18.0/dist/easymde.min.js"
        integrity="sha384-KtB38COewxfrhJxoN2d+olxJAeT08LF8cVZ6DQ8Poqu89zIptqO6zAXoIxpGNWYE"
        crossorigin="anonymous"></script>
<script src="app.js"></script>
</body>
</html>
